name: Deploy Backend to Cloud Run
on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PRAISEGOD_EDU }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker authentication
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Build Docker image locally on GitHub Runner
        run: |
          docker build -t asia-southeast1-docker.pkg.dev/praisegod-edu/cloud-run-source-deploy/ccmed-api:latest .

      - name: Push Docker image to Artifact Registry
        run: |
          docker push asia-southeast1-docker.pkg.dev/praisegod-edu/cloud-run-source-deploy/ccmed-api:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ccmed-api
          image: asia-southeast1-docker.pkg.dev/praisegod-edu/cloud-run-source-deploy/ccmed-api
          region: asia-southeast1
          flags: '--allow-unauthenticated --update-env-vars=DATABASE_URL=${{ secrets.DATABASE_URL }}'
