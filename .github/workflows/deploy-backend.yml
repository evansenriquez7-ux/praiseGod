name: Deploy Backend to Cloud Run
on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'Dockerfile'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PRAISEGOD_EDU }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ccmed-api
          image: asia-southeast1-docker.pkg.dev/${{ secrets.PROJECT_ID }}/cloud-run-source-deploy/ccmed-api
          region: asia-southeast1
          flags: '--allow-unauthenticated --set-env-vars=DATABASE_URL=${{ secrets.DATABASE_URL }}'
