name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cd frontend && npm install && npm run build
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PRAISEGOD_EDU }}

      - name: Deploy to Firebase Hosting
        run: npx -y firebase-tools@latest deploy --only hosting --project praisegod-edu --non-interactive || true
